<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>RememberMyTabs</title>
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        RememberMyTabs
      </div>
      <button id="open-dashboard" class="icon-button" title="Open Workspace Dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
      </button>
    </header>

    <main>
      <div class="actions-section">
        <button id="save-all-btn" class="primary w-full">
          Save Session & Close Tabs
        </button>
        <button id="offload-inactive-btn" class="w-full mt-2">
          Offload Inactive Tabs Now
        </button>
      </div>

      <div class="section-title">Recent Workspaces</div>
      <div id="recent-workspaces" class="workspace-list">
        <!-- Workspaces dynamically rendered here -->
        <div class="empty-state">No saved workspaces.</div>
      </div>
    </main>
  </div>
  <script src="../js/db.js"></script>
  <script src="../js/popup.js"></script>
</body>
</html>
